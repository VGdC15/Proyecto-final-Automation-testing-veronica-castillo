[pytest]
testpaths = tests
python_files = test_*.py
addopts = -v --html=reports/report.html --self-contained-html
markers =
    smoke: pruebas críticas del flujo principal
    login: pruebas relacionadas al inicio de sesión
    catalogo: pruebas relacionadas con el catálogo de productos
    carrito: pruebas relacionadas con el carrito de compras
    checkout: pruebas relacionadas con el flujo de compra
    api: pruebas automatizadas de API con requests